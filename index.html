<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektron Zakaz</title>
    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="theme-color" content="#1e1e1e">
    <link rel="stylesheet" href="style.css">
</head>

<div id="pinModal" class="pin-overlay" style="display: flex;">
    <div class="pin-container">
        <h3>PİN daxil edin</h3>
        <div class="pin-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div id="pinError" class="pin-error-msg" style="display: none;">PİN səhvdir!</div>
        
        <div class="pin-keyboard">
            <button class="pin-btn" data-val="1">1</button>
            <button class="pin-btn" data-val="2">2</button>
            <button class="pin-btn" data-val="3">3</button>
            <button class="pin-btn" data-val="4">4</button>
            <button class="pin-btn" data-val="5">5</button>
            <button class="pin-btn" data-val="6">6</button>
            <button class="pin-btn" data-val="7">7</button>
            <button class="pin-btn" data-val="8">8</button>
            <button class="pin-btn" data-val="9">9</button>
            <button class="pin-btn clear" data-val="C">C</button>
            <button class="pin-btn" data-val="0">0</button>
            <button class="pin-btn delete" data-val="back">⌫</button>
        </div>
    </div>
</div>

<body>

    <div class="app-container">
        
        <div id="page-create" class="card-section page active">
            <h2>🛒 Yeni Sifariş Yarat</h2>
            <div class="form-group">
                <input type="text" id="productName" placeholder="Məhsulun adı..." autocomplete="off">
                <input type="number" id="productCount" placeholder="Neçə ədəd lazımdır?">
                
                <div class="select-group">
                    <label for="companySelect">Şirkət (İstəyə bağlı):</label>
                    <select id="companySelect">
                        <option value="">-- Şirkət Seçilməyib --</option>
                        <option value="Yupiter">Yupiter</option>
                        <option value="ABV">ABV</option>
                        <option value="ONOFF">ONOFF</option>
                        <option value="Aysberg">Aysberg</option>
                    </select>
                </div>
                
                <div class="image-buttons-container">
                    <label for="productImage" class="upload-btn file-btn">📁 Qalereya</label>
                    <input type="file" id="productImage" accept="image/*" style="display: none;">

                    <label for="cameraImage" class="upload-btn camera-btn">📸 Kamera Aç</label>
                    <input type="file" id="cameraImage" accept="image/*" capture="environment" style="display: none;">
                </div>

                <div class="file-status-box" id="fileStatusBox" style="display: none;">
                    <span id="file-name">Şəkil seçilməyib</span>
                    <button type="button" id="clearImageBtn" class="clear-btn">❌ Sil</button>
                </div>

                <button id="saveBtn">Sifarişi Təsdiqlə</button>
                
                <div id="createNotifyBox" class="inline-notify" style="display: none;"></div>
            </div>
        </div>

        <div id="page-list" class="card-section page">
            <h2>📋 Aktiv Sifarişlər</h2>

            <div id="listNotifyBox" class="inline-notify" style="display: none;"></div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Axtar">
            </div>
            
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">Hamısı</button>
                <button class="filter-btn" data-filter="Yupiter">Yupiter</button>
                <button class="filter-btn" data-filter="ABV">ABV</button>
                <button class="filter-btn" data-filter="ONOFF">ONOFF</button>
                <button class="filter-btn" data-filter="Aysberg">Aysberg</button>
                <button class="filter-btn" data-filter="none">Şirkətsiz</button>
            </div>

            <div id="bulkSelectPanel" style="display: none; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; padding: 12px; background: #1a1a1a; border-radius: 8px; flex-wrap: wrap; border: 1px solid #333;">
                <span id="bulkSelectCount" style="color: #fff; font-weight: bold; font-size: 0.95rem;">0 məhsul seçildi</span>
                
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                    <button id="bulkSelectAllBtn" class="bulk-btn" style="background-color: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 4px;">🌐 Hamısını Seç</button>
                    <button id="bulkCancelBtn" class="bulk-btn" style="background-color: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.85rem;">Ləğv Et</button>
                    <button id="bulkMarkPassiveBtn" class="bulk-btn" style="background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 4px;">✓ Alındı Et</button>
                    <button id="bulkDeleteBtn" class="bulk-btn" style="background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 4px;">🗑️ Tam Sil</button>
                </div>
            </div>

            <div id="orderList">
                <p class="empty-text">Siyahı yüklənir...</p>
            </div>
        </div>

        <div class="bottom-nav">
            <button id="nav-create" class="nav-btn active">✍️ Sifariş Yaz</button>
            <button id="nav-list" class="nav-btn">📦 Sifarişlər</button>
        </div>

    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">ℹ️ Sifariş Detalları</h3>
                <span id="closeModalBtn" class="close-icon">&times;</span>
            </div>
            
            <div id="modalViewMode" class="modal-body">
                <div id="modalImageContainer"></div>
                <h4 id="modalProductName"></h4>
                <div class="modal-info-row">
                    <span>Şirkət:</span>
                    <span id="modalCompanyBadge"></span>
                </div>
                <div class="modal-info-row">
                    <span>Sayı:</span>
                    <span id="modalProductCount" style="font-weight: bold; color: #fff;"></span>
                </div>
            </div>

            <div id="modalEditMode" class="modal-body" style="display: none;">
                <div class="form-group">
                    <label style="font-size: 0.85rem; color: #aaa;">Məhsul Adı:</label>
                    <input type="text" id="editProductName" autocomplete="off">
                    
                    <label style="font-size: 0.85rem; color: #aaa;">Sayı:</label>
                    <input type="number" id="editProductCount">
                    
                    <label style="font-size: 0.85rem; color: #aaa;">Şirkət:</label>
                    <select id="editCompanySelect">
                        <option value="">-- Şirkət Seçilməyib --</option>
                        <option value="Yupiter">Yupiter</option>
                        <option value="ABV">ABV</option>
                        <option value="ONOFF">ONOFF</option>
                        <option value="Aysberg">Aysberg</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <div id="viewModeButtons" style="display: flex; gap: 10px; width: 100%;">
                    <button id="modalEditBtn" class="modal-btn-edit">✏️ Redaktə</button>
                    <button id="modalDeleteBtn" class="modal-btn-delete">✓ Alındı</button>
                </div>
                <div id="editModeButtons" style="display: none; gap: 10px; width: 100%;">
                    <button id="modalCancelEditBtn" class="modal-btn-close">Ləğv Et</button>
                    <button id="modalSaveEditBtn" class="modal-btn-save">💾 Yadda Saxla</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
