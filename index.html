<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektron Zakaz</title>
    <link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="icon.png">

<link rel="apple-touch-icon" href="icon.png">

<meta name="theme-color" content="#1e1e1e">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div id="page-create" class="card-section page active">
            <h2>🛒 Yeni Sifariş Yaz</h2>
            <div class="form-group">
                <input type="text" id="productName" placeholder="Məhsulun adı..." autocomplete="off">
                <input type="number" id="productCount" placeholder="Neçə ədəd lazımdır?">
                
                <div class="select-group">
                    <label for="companySelect">Şirkət (İstəyə bağlı):</label>
                    <select id="companySelect">
                        <option value="">-- Şirkət Seçilməyib --</option>
                        <option value="Yupiter">Yupiter</option>
                        <option value="ABV">ABV</option>
                        <option value="ONOFF">ONOFF</option>
                        <option value="Aysberg">Aysberg</option>
                    </select>
                </div>
                
                <div class="image-buttons-container">
                    <label for="productImage" class="upload-btn file-btn">📁 Qalereya</label>
                    <input type="file" id="productImage" accept="image/*" style="display: none;">

                    <label for="cameraImage" class="upload-btn camera-btn">📸 Kamera Aç</label>
                    <input type="file" id="cameraImage" accept="image/*" capture="environment" style="display: none;">
                </div>

                <div class="file-status-box" id="fileStatusBox" style="display: none;">
                    <span id="file-name">Şəkil seçilməyib</span>
                    <button type="button" id="clearImageBtn" class="clear-btn">❌ Sil</button>
                </div>

                <button id="saveBtn">Sifarişi Göndər</button>
            </div>
        </div>

    <div id="page-list" class="card-section page">
            <h2>📋 Aktiv Sifarişlər</h2>
            
            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">Hamısı</button>
                <button class="filter-btn" data-filter="Yupiter">Yupiter</button>
                <button class="filter-btn" data-filter="ABV">ABV</button>
                <button class="filter-btn" data-filter="ONOFF">ONOFF</button>
                <button class="filter-btn" data-filter="Aysberg">Aysberg</button>
                <button class="filter-btn" data-filter="none">Şirkətsiz</button>
            </div>

            <div id="bulkSelectPanel" class="bulk-panel" style="display: none;">
                <span id="bulkSelectCount">0 məhsul seçildi</span>
                <div class="bulk-buttons">
                    <button id="bulkCancelBtn" class="bulk-btn-cancel">Ləğv Et</button>
                    <button id="bulkDeleteBtn" class="bulk-btn-delete">🗑️ Seçilənləri Sil</button>
                </div>
            </div>

            <div id="orderList">
                <p class="empty-text">Siyahı yüklənir...</p>
            </div>
        </div>

        <div class="bottom-nav">
            <button id="nav-create" class="nav-btn active">✍️ Sifariş Yaz</button>
            <button id="nav-list" class="nav-btn">📦 Sifarişlər</button>
        </div>

    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">ℹ️ Sifariş Detalları</h3>
                <span id="closeModalBtn" class="close-icon">&times;</span>
            </div>
            
            <div id="modalViewMode" class="modal-body">
                <div id="modalImageContainer"></div>
                <h4 id="modalProductName"></h4>
                <div class="modal-info-row">
                    <span>Şirkət:</span>
                    <span id="modalCompanyBadge"></span>
                </div>
                <div class="modal-info-row">
                    <span>Sayı:</span>
                    <span id="modalProductCount" style="font-weight: bold; color: #fff;"></span>
                </div>
            </div>

            <div id="modalEditMode" class="modal-body" style="display: none;">
                <div class="form-group">
                    <label style="font-size: 0.85rem; color: #aaa;">Məhsul Adı:</label>
                    <input type="text" id="editProductName" autocomplete="off">
                    
                    <label style="font-size: 0.85rem; color: #aaa;">Sayı:</label>
                    <input type="number" id="editProductCount">
                    
                    <label style="font-size: 0.85rem; color: #aaa;">Şirkət:</label>
                    <select id="editCompanySelect">
                        <option value="">-- Şirkət Seçilməyib --</option>
                        <option value="Yupiter">Yupiter</option>
                        <option value="ABV">ABV</option>
                        <option value="ONOFF">ONOFF</option>
                        <option value="Aysberg">Aysberg</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <div id="viewModeButtons" style="display: flex; gap: 10px; width: 100%;">
                    <button id="modalEditBtn" class="modal-btn-edit">✏️ Redaktə</button>
                    <button id="modalDeleteBtn" class="modal-btn-delete">✓ Alındı</button>
                </div>
                <div id="editModeButtons" style="display: none; gap: 10px; width: 100%;">
                    <button id="modalCancelEditBtn" class="modal-btn-close">Ləğv Et</button>
                    <button id="modalSaveEditBtn" class="modal-btn-save">💾 Yadda Saxla</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
